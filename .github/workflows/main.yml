name: Build and Push Docker Image

# develop: push tag v1.0.x-dev  → tự chạy build + deploy (test)
# main:    push tag v1.0.x       → tự chạy build + deploy (release)
# push branch (không tag)         → không chạy

on:
  push:
    tags:
      - "v*-dev"
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode:"
        required: true
        default: build_and_deploy
        type: choice
        options:
          - build_and_deploy
          - deploy_existing
      ref_name:
        description: "ref_name:"
        required: true
        default: develop
        type: string
      version:
        description: "version:"
        required: true
        type: string

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 541692464957.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY: hk-eco-web-app
  IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref_name || github.ref }}

jobs:
  build-and-push:
    if: ${{ github.event_name == 'push' || inputs.mode == 'build_and_deploy' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: false

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push to ECR
        run: |
          docker build -t hk-eco-web-app:${{ env.IMAGE_TAG }} .
          docker tag hk-eco-web-app:${{ env.IMAGE_TAG }} ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Output image URI
        run: |
          echo "Ref: ${{ env.CHECKOUT_REF }}"
          echo "Image tag: ${{ env.IMAGE_TAG }}"
          echo "Image URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ always() && (github.event_name == 'push' || inputs.mode == 'deploy_existing' || needs.build-and-push.result == 'success') }}

    steps:
      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail

            VERSION="${{ env.IMAGE_TAG }}"
            IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${VERSION}"
            echo "Deploying $IMAGE"

            if ! command -v docker >/dev/null 2>&1; then
              sudo dnf install -y docker
              sudo systemctl enable --now docker
            fi

            if ! command -v aws >/dev/null 2>&1; then
              sudo dnf install -y aws-cli
            fi

            unset AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
            export AWS_DEFAULT_REGION="${{ env.AWS_REGION }}"

            aws ecr get-login-password --region "$AWS_DEFAULT_REGION" \
              | sudo docker login --username AWS --password-stdin "${{ env.ECR_REGISTRY }}"

            if sudo docker ps -a -q -f name=hk-eco-app | grep -q .; then
              sudo docker stop hk-eco-app || true
              sudo docker rm hk-eco-app || true
            fi

            sudo docker pull "$IMAGE"
            sudo docker run -d -p 80:80 --name hk-eco-app --restart unless-stopped "$IMAGE"

            sudo docker ps --filter name=hk-eco-app
            curl -fsS http://127.0.0.1/ >/dev/null
            echo "Deploy OK: http://${{ secrets.EC2_PUBLIC_IP }}/"